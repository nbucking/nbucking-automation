---
# This role needs to be updated

- name: Set AAP151 Authorized Key for Greenway user
  authorized_key:
    user: greenway
    state: present
    key: "ssh-rsa  greenway@csstsrvlvaap151"
    exclusive: no

- name: Check if firewalld is active
  command: /usr/bin/systemctl is-active firewalld
  register: chk_firewalld
  ignore_errors: yes

- name: Check if the ssh_access zone is configured
  shell: 'firewall-cmd --get-active-zones |grep -c ^ssh_access || /bin/true'
  register: chk_zones 
  ignore_errors: yes
  when: chk_firewalld.stdout == "active"

- debug: var=chk_firewalld
- debug: var=chk_zones

- block:
  - name: Enable SSH access from AAP servers
    firewalld:
      zone: ssh_access
      permanent: yes
      source: "{{ item }}"
      state: enabled
    loop:
      - 198.51.100.10
      - 198.51.100.10
      - 198.51.100.10
      - 198.51.100.10
      - 198.51.100.10
      - 198.51.100.20
      - 198.51.100.20
      - 198.51.100.10
    notify: "reload firewalld"
  when: (( chk_firewalld.stdout == "active" ) and ( chk_zones.stdout | int > 0 ))

# EOF
