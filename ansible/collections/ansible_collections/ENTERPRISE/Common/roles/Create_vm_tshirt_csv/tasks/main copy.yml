---

# - name: Run only if the VMLOCATION matches my_datacenter
#   debug:
#     msg: "Skipping this vcenter server"
#   when: VMLOCATION != my_datacenter

- name: Download the CSV file
  ansible.builtin.get_url:
    url: https://csstsrvlvsat151.services.stamp.tsa.dhs.gov/pulp/content/STA/Library/custom/STAMPLinuxBinaries/Configuration/serverdetails.csv
    dest: /var/tmp/serverdetails.csv
    mode: '0644'
    validate_certs: no
  delegate_to: localhost

- name: Read CSV file
  community.general.read_csv:
    path: /var/tmp/serverdetails.csv
  register: newvms_list
  delegate_to: localhost

- debug: var=newvms_list

# - name: Set variables
#   set_fact:
#     my_ip_address: "{{ newvms_list.list.my_ip_address }}"
#     my_vct_servername: "{{ newvms_list.list.my_vct_servername }}"
#     my_server_details: "{{ newvms_list.list.my_server_details }}"
#     my_server_size: "{{ newvms_list.list.my_server_size }}"

- name: "Grab the variables to build a server: {{ newvms_list.list.my_vct_servername }}"
  ansible.builtin.include_vars: Configure_{{ newvms_list.list.my_server_details }}.yml

- name: "Build the server in that environment"
  ansible.builtin.include_tasks: Create_{{ newvms_list.list.my_server_size }}.yml

