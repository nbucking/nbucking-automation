- name: Clean yum cache file and do a yum clean all
  file: 
    path: "{{ item }}"
    state: absent
  with_items:
   - /etc/puppetlabs/puppet/ssl/
   - /var/cache/yum/

- name: Unregister server from cap server
  redhat_subscription:
    state: absent

- name: Clean subscription-manager
  command: '/usr/sbin/subscription-manager clean'

- name: Remove katello-ca package
  yum:
    name: katello-ca*
    state: absent
# Info: Update the /etc/hosts file
#############################################

- name: Add new cap server to /etc/hosts file
  lineinfile:
    path: /etc/hosts
    line: "{{ thiscapserverip }}            {{ thiscapserver }}"
    state: present

- name: Install katello-ca for cap server
  yum:
    name: http://{{ thiscapserver }}/pub/katello-ca-consumer-latest.noarch.rpm
    disable_gpg_check: yes
    state: present

- name: Set register_host fact
  set_fact:
    register_host: "curl -sS --insecure '{{ thiscapserverurl }}/register?activation_keys={{ thisactivation_key }}&hostgroup_id={{ thishostgroup_id }}&location_id={{ thislocation_id }}&organization_id=1&update_packages=false' -H 'Authorization: Bearer eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyX2lkIjo4LCJpYXQiOjE2Nzk1MTk4NzgsImp0aSI6IjBiOWM5MDc2MmJlZTE1Y2U5ZGRhMmY0NTkzYzMxMDA4NDdlOWM2YzJkNDkzNWVmM2M0NTAxNzIwZjkwMTdhZmMiLCJzY29wZSI6InJlZ2lzdHJhdGlvbiNnbG9iYWwgcmVnaXN0cmF0aW9uI2hvc3QifQ.6Imz7BAG-TC5J4WzItVBrg6x9VLE84sfvqDHQIjQmkw' | bash"

- name: Run the register host curl command
  shell: "{{ register_host }}"
  register: register_host_output

- debug:
    var: register_host_output

