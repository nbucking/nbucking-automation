---
# Info: Set variables
#############################################
- name: Lookup host data in lookup table host_data.csv
  set_fact:
    lookupNodename:     "{{ lookup('csvfile', '{{ ansible_nodename }} file=host_data.csv default=not_found col=0') }}"
    thislocation:       "{{ lookup('csvfile', '{{ ansible_nodename }} file=host_data.csv default=not_found col=1') }}"
    thisDC:             "{{ lookup('csvfile', '{{ ansible_nodename }} file=host_data.csv default=not_found col=2') }}"
    thisactivation_key: "{{ lookup('csvfile', '{{ ansible_nodename }} file=host_data.csv default=not_found col=3') }}"

- name: Verify host was found in the host lookup table
  fail:
    msg: " Could not find {{ ansible_nodename }} in host lookup table"
  failed_when: lookupNodename == "not_found"

- name: Verify activation_key was found in the host lookup table
  fail:
    msg: " Could not find the activation_key for {{ ansible_nodename}} in host lookup table"
  failed_when: thisactivation_key == "not_found"

- name: Verify Data center was found in the host lookup table
  fail:
    msg: " Could not find the data center for {{ ansible_nodename }} in host lookup table"
  failed_when: thisDC == "not_found"

- name: Verify location was found in the host lookup table
  fail:
    msg: " Could not find the location for {{ ansible_nodename }} in host lookup table"
  failed_when: thislocation == "not_found"

- name: Lookup location ID in lookup table location_lookup_table.csv
  set_fact:
    thislocation_id:    "{{ lookup('csvfile', '{{ thislocation }} file=location_lookup_table.csv default=not_found col=1') }}"

- name: Verify location id was found in the location lookup table
  fail:
    msg: " Could not find the location for {{ thislocation }} in host lookup table"
  failed_when: thislocation_id == "not_found"

- name: Lookup Hostgroup and Hostgroup ID in lookup table hostgroup_lookup_table.csv
  set_fact:
    thishostgroup:    "{{ lookup('csvfile', '{{ thisDC }} file=hostgroup_lookup_table.csv default=not_found col=1') }}"
    thishostgroup_id: "{{ lookup('csvfile', '{{ thisDC }} file=hostgroup_lookup_table.csv default=not_found col=2') }}"

- name: Verify Hostgroup id for data center was found in the hostgroup lookup table
  fail:
    msg: " Could not find the hostgroup ID for {{ thishostgroup_id }} in the hostgroup lookup table"
  failed_when: thishostgroup_id == "not_found"

# Info: Set CAP serve based on datacenter
#############################################
- name: Lookup Cap server info data center
  set_fact:
    thiscapserver:      "{{ lookup('csvfile', '{{ thisDC }} file=capserver_lookup_table.csv default=not_found col=1') }}"
    thiscapserverurl:   "{{ lookup('csvfile', '{{ thisDC }} file=capserver_lookup_table.csv default=not_found col=2') }}"
    thiscapserverip:    "{{ lookup('csvfile', '{{ thisDC }} file=capserver_lookup_table.csv default=not_found col=4') }}"

- name: Verify CAP server for {{ thisDC }} was found in the capserver lookup table
  fail:
    msg: " Could not find CAP server in the capserver lookup table for data center {{ thisDC }}"
  failed_when: thiscapserver == "not_found"

- name: Verify CAP server URL for {{ thisDC }} was found in the capserver lookup table
  fail:
    msg: " Could not find CAP server URL in the capserver lookup table for data center {{ thisDC }}"
  failed_when: thiscapserverurl == "not_found"

- name: Verify CAP server IP for {{ thisDC }} was found in the capserver lookup table
  fail:
    msg: " Could not find CAP server IP in the capserver lookup table for data center {{ thisDC }}"
  failed_when: thiscapserverip == "not_found"

