---
# tasks file for TakeASnapshot
- name: Get Datacenter Information
  ansible.builtin.include_role:
    name: GetDatacenterInfo
  when: my_datacenter is not defined

- name: Get Folder Information
  ansible.builtin.include_role:
    name: GetFolderInfo
  when: my_folder is not defined

- name: Gather info block
  block:
  - name: Gather snapshot information about the virtual machine in the given vCenter
    community.vmware.vmware_guest_snapshot_info:
      hostname: "{{ vcenter_hostname | default(omit) }}"
      username: "{{ vcenter_username | default(omit) }}"
      password: "{{ vcenter_password | default(omit) }}"
      datacenter: "{{ my_datacenter }}"
      folder: "{{ my_folder }}"
      name: "{{ my_vct_servername }}"
    delegate_to: localhost
    register: snapshot_info

  - name: Set the variables for amount of snapshots
    ansible.builtin.set_fact: 
      qty_snapshots: "{{ snapshot_info['guest_snapshots']['snapshots'] | length }}"
    when: snapshot_info['guest_snapshots'] | length > 0

  - debug: msg="There are 0 snapshots on this host"
    when: snapshot_info['guest_snapshots'] | length == 0

  - debug: msg="There are/is {{ qty_snapshots }} snapshot(s) on this host"
    when: snapshot_info['guest_snapshots'] | length > 0

  when: VMLOCATION == my_datacenter

- name: Remove all previous snapshots?
  block:
  - name: Remove all snapshots for "{{ my_vct_servername }}"
    community.vmware.vmware_guest_snapshot:
      hostname: "{{ vcenter_hostname | default(omit) }}" 
      username: "{{ vcenter_username | default(omit) }}"
      password: "{{ vcenter_password | default(omit) }}"
      datacenter: "{{ my_datacenter }}"
      folder: "{{ my_folder }}"
      name: "{{ my_vct_servername }}"
      state: remove_all
      validate_certs: false
    delegate_to: localhost

  - name: Sending email to the VMWare team for awareness
    community.general.mail:
      host: 172.28.26.64
      port: 25
      to: STAMPVMAdmin@tsa.dhs.gov,StampAutomation@tsa.dhs.gov
      cc: "{{ tower_user_email | default(omit) }}"
      from: StampAutomation@tsa.dhs.gov
      subject: "All VMWare Snapshots removed from {{ my_vct_servername }} using Ansible Automation Platform"
      body: "Job ID: {{ tower_job_id is defined | ansible.builtin.ternary(tower_job_id,tower_workflow_job_id) }}"
    delegate_to: localhost

  when: VMLOCATION == my_datacenter and remove_prev_snaps == 'YES' and qty_snapshots is defined

- name: Main Block
  block:
  - name: Grab the current time
    ansible.builtin.set_fact:
      time: "{{ lookup('pipe','env TZ=America/New_York date \"+%Y-%m-%d %H:%M:%S\" -d \"+{{ offset }}\"') }}"
      time_hr: "{{ lookup('pipe','env TZ=America/New_York date \"+%A, %B %d, %Y @ %H:%M:%S\" -d \"+{{ offset }}\"') }}"

  - name: Set Description to be added to each snapshot
    ansible.builtin.set_fact:
      description_text: |
        Snapshot taken using Ansible Automation Platform
        Job ID: {{ tower_job_id is defined | ansible.builtin.ternary(tower_job_id,tower_workflow_job_id,tower_schedule_id) }}
        Creator: {{ tower_user_name is defined | ansible.builtin.ternary(tower_user_name,tower_workflow_job_name) }}
        Time: {{ lookup('pipe','env TZ=America/Denver date') }}
        Snapshot Name: {{ my_snapshot_name }}
        User's Description: {{ my_description }}
        This snapshot will be automatically REMOVED on {{ time_hr }} ET
      
  - name: "Create a snapshot for {{ my_vct_servername }}"
    community.vmware.vmware_guest_snapshot:
      hostname: "{{ vcenter_hostname | default(omit) }}" 
      username: "{{ vcenter_username | default(omit) }}"
      password: "{{ vcenter_password | default(omit) }}"
      datacenter: "{{ my_datacenter }}"
      folder: "{{ my_folder }}"
      name: "{{ my_vct_servername }}"
      state: present
      snapshot_name: "{{ my_snapshot_name  }}"
      description:   "{{ description_text   | default(omit) }}"
      validate_certs: false
    register: snapshot
    delegate_to: localhost
  
  - name: Gather snapshot information about the virtual machine in the given vCenter
    community.vmware.vmware_guest_snapshot_info:
      hostname: "{{ vcenter_hostname | default(omit) }}"
      username: "{{ vcenter_username | default(omit) }}"
      password: "{{ vcenter_password | default(omit) }}"
      datacenter: "{{ my_datacenter }}"
      folder: "{{ my_folder }}"
      name: "{{ my_vct_servername }}"
    delegate_to: localhost
    register: snapshot_info

  - name: See the output of snapshot_info
    ansible.builtin.debug: 
      var: snapshot_info['guest_snapshots']['snapshots']
      verbosity: 1

  - name: Set the variables for amount of snapshots
    ansible.builtin.set_fact: 
      qty_snapshots: "{{ snapshot_info['guest_snapshots']['snapshots'] | length | int }}"

  - debug: msg="There is {{ qty_snapshots }} snapshot on this host"
    when: qty_snapshots | int == 1 | int
  
  - debug: msg="There are {{ qty_snapshots }} snapshots on this host"
    when: qty_snapshots | int > 1 | int

  - name: Sending email to the VMWare team for awareness
    community.general.mail:
      host: 172.28.26.64
      port: 25
      to: STAMPVMAdmin@tsa.dhs.gov,StampAutomation@tsa.dhs.gov
      cc: "{{ tower_user_email | default(omit) }}"
      from: StampAutomation@tsa.dhs.gov
      subject: "VMWare Snapshot taken on {{ my_vct_servername }}"
      body: |
        {{ description_text }}
        There are {{ qty_snapshots }} snapshots on this host
        This snapshot will be automatically removed on {{ time_hr }} ET
    when: snapshot is changed
    delegate_to: localhost

  - name: Build the schedule to remove snapshots Automatically at a later date
    ansible.controller.schedule:
      name: "{{ template_name }} ; Auto Schedule for Job ID {{ tower_workflow_job_id }}"
      state: present
      unified_job_template: "{{ template_name }}"
      rrule: "{{ query('ansible.controller.schedule_rrule', 'none', start_date=time, timezone='US/Eastern') }}"        
      validate_certs: no
      controller_host: aap-controller.example.com
      controller_oauthtoken: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          EXAMPLE_ENCRYPTED_VALUE_REDACTED_FOR_PUBLIC_REPOSITORY
      extra_data: 
        _hosts: "{{ _hosts }}"
        are_you_sure: 'YES'
        tower_user_name: "{{ tower_user_name }}"
    run_once: True
    ignore_errors: true

  - name: Time the Snapshots will be removed
    ansible.builtin.debug:
      msg: 
        - "These Snapshots will be REMOVED on {{ time_hr }} ET"
        - "If you need these snapshots to stay for a longer duration, please reach out to the Automation Team for assistance"
    run_once: True
  
  when: VMLOCATION == my_datacenter