---
# Common Collection - VMware Snapshot Playbook
# This playbook creates VM snapshots using the ENTERPRISE.Common.TakeASnapshot role
# The my_snapshot_removal_date is calculated at runtime from snapshot_retention_days

- name: Create VMware VM Snapshot
  hosts: all
  gather_facts: yes
  
  vars:
    # These variables should be passed from the job template or workflow
    # my_snapshot_name: "Exchange-PreMaint-{{ ansible_date_time.date }}"
    # my_description: "Pre-maintenance snapshot taken before Exchange Server maintenance"
    # snapshot_retention_days: 7
    # remove_prev_snapshots: true
    
    # Calculate the removal date from snapshot_retention_days
    # This must be done in the playbook because ansible_date_time is only available at runtime
    my_snapshot_removal_date: "{{ '%m/%d/%Y' | strftime(ansible_date_time.epoch | int + (snapshot_retention_days | default(7) * 86400)) }}"
  
  tasks:
    - name: Display snapshot configuration
      ansible.builtin.debug:
        msg:
          - "Snapshot Name: {{ my_snapshot_name }}"
          - "Description: {{ my_description }}"
          - "Retention Days: {{ snapshot_retention_days | default(7) }}"
          - "Removal Date: {{ my_snapshot_removal_date }}"
          - "Remove Previous: {{ remove_prev_snapshots | default(true) }}"
    
    - name: Create VM Snapshot using ENTERPRISE.Common.TakeASnapshot role
      ansible.builtin.include_role:
        name: ENTERPRISE.Common.TakeASnapshot
      vars:
        # Pass calculated date to the role
        snapshot_name: "{{ my_snapshot_name }}"
        description: "{{ my_description }}"
        removal_date: "{{ my_snapshot_removal_date }}"
        remove_previous: "{{ remove_prev_snapshots | default(true) }}"
    
    - name: Report snapshot creation
      ansible.builtin.debug:
        msg: "Snapshot '{{ my_snapshot_name }}' created successfully. Will be removed on {{ my_snapshot_removal_date }}"
