---
# Production Exchange Environment Inventory
# EXAMPLE-MB01 Production Database Environment

all:
  children:
    exchange_servers:
      hosts:
        # Update these with your actual production Exchange server hostnames
        exchange-prod-01.stamp.example.com:
          ansible_host: 198.51.100.101
          exchange_server_role: "Mailbox"
          exchange_database_preference: 1
          
        exchange-prod-02.stamp.example.com:
          ansible_host: 198.51.100.102
          exchange_server_role: "Mailbox"
          exchange_database_preference: 2
          
      vars:
        # Production environment settings
        environment_type: production
        target_database: "EXAMPLE-MB01"
        
        # Connection settings for Windows
        ansible_connection: winrm
        ansible_winrm_transport: kerberos
        ansible_winrm_server_cert_validation: ignore
        ansible_port: 5986
        ansible_winrm_scheme: https
        
        # Exchange-specific settings
        exchange_organization: "ENTERPRISE-Exchange"
        exchange_admin_group: "Organization Management"
        exchange_version: "2019"  # or "2016", "SE"
        
        # Maintenance settings
        maintenance_window_duration: 120  # minutes
        auto_move_active_db: false
        emergency_contact: "stamp-oncall@company.com"
        
        # Backup and recovery
        backup_retention_days: 30
        log_retention_days: 14
        
    exchange_dag_members:
      hosts:
        exchange-prod-01.stamp.example.com:
        exchange-prod-02.stamp.example.com:
      vars:
        dag_name: "ENTERPRISE-DAG01"
        dag_witness_server: "dc01.stamp.example.com"
        dag_witness_directory: "C:\\DAGWitness\\ENTERPRISE-DAG01"