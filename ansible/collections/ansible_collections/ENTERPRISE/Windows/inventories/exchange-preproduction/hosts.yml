---
# Pre-production Exchange Environment Inventory  
# PREPROD-MB01 Pre-production Database Environment

all:
  children:
    exchange_servers:
      hosts:
        # Update these with your actual pre-production Exchange server hostnames
        exchange-ppd-01.stamp.example.com:
          ansible_host: 198.51.100.201
          exchange_server_role: "Mailbox"
          exchange_database_preference: 1
          
        exchange-ppd-02.stamp.example.com:
          ansible_host: 198.51.100.202
          exchange_server_role: "Mailbox"
          exchange_database_preference: 2
          
      vars:
        # Pre-production environment settings
        environment_type: preproduction
        target_database: "PREPROD-MB01"
        
        # Connection settings for Windows
        ansible_connection: winrm
        ansible_winrm_transport: kerberos
        ansible_winrm_server_cert_validation: ignore
        ansible_port: 5986
        ansible_winrm_scheme: https
        
        # Exchange-specific settings
        exchange_organization: "ENTERPRISE-Exchange-PPD"
        exchange_admin_group: "Organization Management"
        exchange_version: "2019"  # or "2016", "SE"
        
        # Maintenance settings (more relaxed for testing)
        maintenance_window_duration: 180  # minutes - longer for testing
        auto_move_active_db: true  # Allow automatic moves in PPD
        emergency_contact: "stamp-dev-team@company.com"
        
        # Backup and recovery (shorter retention for testing)
        backup_retention_days: 7
        log_retention_days: 7
        
        # Testing flags
        testing_mode: true
        skip_production_checks: true
        allow_experimental_features: true
        
    exchange_dag_members:
      hosts:
        exchange-ppd-01.stamp.example.com:
        exchange-ppd-02.stamp.example.com:
      vars:
        dag_name: "PREPROD-DAG01"
        dag_witness_server: "dc01-ppd.stamp.example.com"
        dag_witness_directory: "C:\\DAGWitness\\PREPROD-DAG01"